version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: quark_test
    ports:
      - "3307:3306"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: quark_user
      POSTGRES_PASSWORD: quark_pass
      POSTGRES_DB: quark_test
    ports:
      - "5433:5432"

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Password123!"
      MSSQL_PID: "Developer"
    ports:
      - "1434:1433"

  oracle:
    image: gvenzl/oracle-free:latest
    environment:
      ORACLE_PASSWORD: "Password123!"
      APP_USER: "quark_user"
      APP_USER_PASSWORD: "quark_pass"
    ports:
      - "1522:1521"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
