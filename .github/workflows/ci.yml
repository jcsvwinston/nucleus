name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test And Smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - "1.26.3"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Verify Go Modules
        run: go mod verify

      - name: Run Go Tests
        run: go test ./...

      - name: Run Go Vet
        run: go vet ./...

      - name: Run Go Build
        run: go build ./...

      - name: Run Core Race Tests
        run: go test -race ./pkg/... ./internal/cli ./cmd/nucleus ./examples/mvc_api/... ./examples/plugins/...

      - name: Run Example Smoke
        run: go test ./examples/mvc_api/cmd/server -run '^TestExampleMVCAPIAdmin_Smoke$' -count=1 -v

      - name: Build Admin UI
        working-directory: pkg/admin/ui
        run: |
          npm ci
          npm run build
          npm audit --omit=dev --audit-level=high

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  db-matrix-required:
    name: DB Matrix Required (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: postgresql
            database_url: postgres://postgres:postgres@127.0.0.1:5432/nucleus?sslmode=disable
          - profile: mysql
            database_url: mysql://root:root@127.0.0.1:3306/nucleus

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: nucleus
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nucleus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: nucleus
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          cache: true

      - name: Run DB runtime smoke
        env:
          NUCLEUS_SQL_MATRIX_URL: ${{ matrix.database_url }}
        run: go test ./pkg/db -run '^TestSQLMatrix_ConnectAndPing$' -v

      - name: Run CLI critical command smoke
        env:
          NUCLEUS_SQL_MATRIX_URL: ${{ matrix.database_url }}
        run: go test ./internal/cli -run '^TestSQLMatrix_CriticalCommands$' -v

  db-matrix-live-mssql:
    name: DB Matrix Live (mssql)
    runs-on: ubuntu-latest

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "StrongPassw0rd!"
        ports:
          - 1433:1433

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          cache: true

      - name: Wait for SQL Server port
        run: |
          for i in {1..60}; do
            if (echo > /dev/tcp/127.0.0.1/1433) >/dev/null 2>&1; then
              echo "SQL Server port is ready"
              exit 0
            fi
            sleep 5
          done
          echo "SQL Server did not become reachable on 1433"
          exit 1

      - name: Run live smoke (MSSQL)
        env:
          NUCLEUS_SQL_EXPLORATORY_URL: 'sqlserver://sa:StrongPassw0rd!@127.0.0.1:1433/master'
        run: |
          go test -tags mssql ./pkg/db -run '^TestSQLMatrix_ExploratoryLiveConnectAndPing$' -v
          go test -tags mssql ./internal/cli -run '^TestSQLMatrix_ExploratoryCriticalCommands$' -v

  db-matrix-live-oracle:
    name: DB Matrix Live (oracle)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      oracle:
        image: gvenzl/oracle-free:23-slim
        env:
          ORACLE_PASSWORD: "oracle"
        ports:
          - 1521:1521
        options: >-
          --shm-size=1g

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          cache: true

      - name: Wait for Oracle port
        run: |
          for i in {1..120}; do
            if (echo > /dev/tcp/127.0.0.1/1521) >/dev/null 2>&1; then
              echo "Oracle port is ready"
              exit 0
            fi
            sleep 5
          done
          echo "Oracle did not become reachable on 1521"
          exit 1

      - name: Run live smoke (Oracle)
        env:
          NUCLEUS_SQL_EXPLORATORY_URL: 'oracle://system:oracle@127.0.0.1:1521/FREEPDB1'
        run: |
          go test -tags oracle ./pkg/db -run '^TestSQLMatrix_ExploratoryLiveConnectAndPing$' -v
          go test -tags oracle ./internal/cli -run '^TestSQLMatrix_ExploratoryCriticalCommands$' -v

  compatibility-harness:
    name: Compatibility Harness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          cache: true

      - name: Run fixture compatibility harness
        run: |
          mkdir -p ci-reports
          bash scripts/ci/run_compatibility_harness.sh \
            --output ci-reports/compatibility_harness.md \
            --enforce-threshold

      - name: Upload compatibility harness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compatibility-harness-${{ github.run_id }}
          path: ci-reports/compatibility_harness.md
          if-no-files-found: error

  contract-freeze:
    name: Contract Freeze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          cache: true

      - name: Validate stable contract freeze baselines
        run: bash scripts/ci/check_contract_freeze.sh

  admin-skeleton:
    name: Admin Observability Skeleton
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # buf breaking compares against origin/main

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint proto
        run: make proto-lint

      - name: Detect breaking proto changes vs main
        # Only enforce on PRs; on pushes to main, the comparison target is the
        # current commit, which would always pass.
        #
        # Compare against the locally fetched origin/main (the agent's
        # actions/checkout step already ran with fetch-depth: 0). HTTPS
        # clone of the repo at runtime fails on the runner because git
        # has no credential helper configured; the local ref is always
        # available.
        #
        # The first PR that introduces admin/proto/ won't have a buf
        # module to compare against on origin/main; we skip rather than
        # fail in that case (additive-from-nothing is by definition not
        # a breaking change).
        if: github.event_name == 'pull_request'
        run: |
          if ! git -C "$GITHUB_WORKSPACE" cat-file -e "origin/main:admin/proto/buf.yaml" 2>/dev/null; then
            echo "admin/proto/buf.yaml not present on origin/main; skipping buf breaking (additive introduction)."
            exit 0
          fi
          cd admin/proto
          buf breaking --against "$GITHUB_WORKSPACE/.git#ref=refs/remotes/origin/main,subdir=admin/proto"

      - name: Generate stubs and verify reproducibility
        run: |
          make proto
          if ! git diff --quiet --exit-code -- admin/proto/gen admin/ui/src/gen; then
            echo "::error::Generated stubs are out of date. Run 'make proto' and commit the diff."
            git --no-pager diff -- admin/proto/gen admin/ui/src/gen
            exit 1
          fi

      - name: Build admin Go modules (proto + agent + server)
        run: |
          cd admin/proto && go build ./...
          cd ../agent && go build ./...
          cd ../server && go build ./...

      - name: Vet admin Go modules
        run: |
          cd admin/proto && go vet ./...
          cd ../agent && go vet ./...
          cd ../server && go vet ./...

      - name: Test admin Go modules
        run: |
          cd admin/proto && go test ./...
          cd ../agent && go test ./...
          cd ../server && go test ./...

      - name: Build admin server binary
        run: make server-build

      - name: Install admin UI deps
        working-directory: admin/ui
        run: npm ci

      - name: Lint admin UI
        working-directory: admin/ui
        run: npm run lint

      - name: Typecheck admin UI
        working-directory: admin/ui
        run: npm run typecheck

      - name: Build admin UI
        working-directory: admin/ui
        run: npm run build

  ci-required-gate:
    name: CI Required Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - test
      - db-matrix-required
      - db-matrix-live-mssql
      - db-matrix-live-oracle
      - compatibility-harness
      - contract-freeze
      - admin-skeleton

    steps:
      - name: Evaluate required CI results
        run: |
          set -euo pipefail
          echo "test result: ${{ needs.test.result }}"
          echo "db-matrix-required result: ${{ needs.db-matrix-required.result }}"
          echo "db-matrix-live-mssql result: ${{ needs.db-matrix-live-mssql.result }}"
          echo "db-matrix-live-oracle result: ${{ needs.db-matrix-live-oracle.result }}"
          echo "compatibility-harness result: ${{ needs.compatibility-harness.result }}"
          echo "contract-freeze result: ${{ needs.contract-freeze.result }}"
          echo "admin-skeleton result: ${{ needs.admin-skeleton.result }}"

          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Required job 'test' did not succeed"
            exit 1
          fi
          if [ "${{ needs.db-matrix-required.result }}" != "success" ]; then
            echo "Required job 'db-matrix-required' did not succeed"
            exit 1
          fi
          if [ "${{ needs.db-matrix-live-mssql.result }}" != "success" ]; then
            echo "Required job 'db-matrix-live-mssql' did not succeed"
            exit 1
          fi
          if [ "${{ needs.db-matrix-live-oracle.result }}" != "success" ]; then
            echo "Required job 'db-matrix-live-oracle' did not succeed"
            exit 1
          fi
          if [ "${{ needs.compatibility-harness.result }}" != "success" ]; then
            echo "Required job 'compatibility-harness' did not succeed"
            exit 1
          fi
          if [ "${{ needs.contract-freeze.result }}" != "success" ]; then
            echo "Required job 'contract-freeze' did not succeed"
            exit 1
          fi
          if [ "${{ needs.admin-skeleton.result }}" != "success" ]; then
            echo "Required job 'admin-skeleton' did not succeed"
            exit 1
          fi

          echo "All required CI jobs passed."
