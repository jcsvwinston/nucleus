name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test And Smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - "1.26.5"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Verify Go Modules
        run: go mod verify

      - name: Check version claims in canonical docs
        # Forcing function against doc/version drift (NU-P0-2): README/SPEC/
        # intro version claims must match .release-please-manifest.json.
        # release-please rewrites the marked lines on each release PR via
        # extra-files, so this only fails on hand-edited or unmarked claims.
        run: ./scripts/ci/check_version_claims.sh

      - name: Check the published docs speak the reader's language
        # Keeps internal engineering vocabulary out of website/docs/**. A
        # reader evaluating Nucleus does not know what ADR-010 is, what "P0"
        # means, or that SPEC.md and CLAUDE.md exist — those are artefacts of
        # how we build the framework, not of how anyone uses it. The internal
        # tree is untouched by this rule; only what we publish has to speak
        # the reader's language.
        run: bash scripts/ci/check_docs_product_voice.sh

      - name: Check the generated configuration reference is fresh
        # website/docs/reference/configuration.md is GENERATED from
        # docs/reference/CONFIG_KEY_REGISTRY.md by
        # scripts/website/gen-config-reference. Anti-drift gate: editing the
        # registry without regenerating — or hand-editing the generated
        # page — must fail loudly, not ship a stale reference.
        run: |
          go run ./scripts/website/gen-config-reference
          git diff --exit-code website/docs/reference/configuration.md

      - name: Run Go Tests
        run: go test ./...

      - name: Run Go Vet
        run: go vet ./...

      - name: Run Go Build
        run: go build ./...

      - name: Run Core Race Tests
        run: go test -race ./pkg/... ./internal/cli ./cmd/nucleus

      - name: Run govulncheck
        # Pinned to v1.3.0: govulncheck @latest (x/vuln v1.4.0) pulls
        # golang.org/x/tools v0.46.0, whose typesinternal.ForEachElement panics
        # on generic types ("ForEachElement called on type containing
        # *types.TypeParam") under Go 1.26 — which aborts the scan for this
        # generics-heavy module (panic, not a vuln finding). v1.3.0 is the last
        # release that analyses cleanly. Unpin once a newer x/tools fixes the
        # panic. The vulnerability database is fetched at run time, so a pinned
        # binary still scans against current advisories.
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...

  db-matrix-required:
    name: DB Matrix Required (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: postgresql
            database_url: postgres://postgres:postgres@127.0.0.1:5432/nucleus?sslmode=disable
          - profile: mysql
            database_url: mysql://root:root@127.0.0.1:3306/nucleus

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: nucleus
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nucleus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: nucleus
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true

      - name: Run DB runtime smoke
        env:
          NUCLEUS_SQL_MATRIX_URL: ${{ matrix.database_url }}
        # InstrumentLive: the W2 driver-wrapper live test reads
        # NUCLEUS_SQL_MATRIX_URL and only accepts the required profiles
        # (postgres/mysql), but since v1.3.0 no lane's -run filter included
        # it, so it had never executed against a real engine in CI (NU7-4).
        run: go test ./pkg/db -run '^TestSQLMatrix_ConnectAndPing$|^TestSQLMatrix_SchemaDrift$|^TestInstrumentLive_WrapsRealDriver$' -v

      - name: Run App AutoMigrate live smoke
        env:
          NUCLEUS_SQL_MATRIX_URL: ${{ matrix.database_url }}
        run: go test ./pkg/app -run '^TestSQLMatrix_AutoMigrate$' -v

      - name: Run CLI critical command smoke
        env:
          NUCLEUS_SQL_MATRIX_URL: ${{ matrix.database_url }}
        run: go test ./internal/cli -run '^TestSQLMatrix_CriticalCommands$' -v

      # The whole TestCRUDLive_ family, not one hand-picked test: the narrow
      # filter is how the RETURNING-path scenarios (string/UUID PK, no PK,
      # insert-event row count) would silently stay out of the only lane with
      # a real Postgres (5ª ronda: NU5-2/NU5-5).
      - name: Run model CRUD live matrix
        env:
          NUCLEUS_SQL_MATRIX_URL: ${{ matrix.database_url }}
        run: go test ./pkg/model -run '^TestCRUDLive_' -v

  jobs-redis:
    name: Module Jobs (real Redis)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true

      # The asynq jobs provider against a REAL Redis server, not just
      # miniredis: the same registration→schedule→enqueue→worker→handler
      # scenario the in-process test runs, plus the pkg/tasks provider
      # stop-path regression pins. Env-gated tests — without
      # NUCLEUS_JOBS_REDIS_URL they self-skip, so this lane is the only
      # place they execute.
      - name: Run module-jobs asynq scenario against real Redis
        env:
          NUCLEUS_JOBS_REDIS_URL: redis://127.0.0.1:6379/0
        run: go test ./pkg/nucleus -run '^TestJobsStart_AsynqAgainstRealRedis$' -count=1 -v

      - name: Run pkg/tasks asynq provider suite
        run: go test ./pkg/tasks/... -count=1

  db-matrix-live-mssql:
    name: DB Matrix Live (mssql)
    runs-on: ubuntu-latest

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "StrongPassw0rd!"
        ports:
          - 1433:1433

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true

      - name: Wait for SQL Server port
        run: |
          for i in {1..60}; do
            if (echo > /dev/tcp/127.0.0.1/1433) >/dev/null 2>&1; then
              echo "SQL Server port is ready"
              exit 0
            fi
            sleep 5
          done
          echo "SQL Server did not become reachable on 1433"
          exit 1

      - name: Run live smoke (MSSQL)
        env:
          NUCLEUS_SQL_EXPLORATORY_URL: 'sqlserver://sa:StrongPassw0rd!@127.0.0.1:1433/master'
        run: |
          go test -tags mssql ./pkg/db -run '^TestSQLMatrix_ExploratoryLiveConnectAndPing$|^TestSQLMatrix_SchemaDrift_Exploratory$' -v
          # AdminUserCommands: createuser/changepassword round-trip with the
          # orbit admin schema provisioned — the only lane where their TOP 1
          # lookup branch runs against real T-SQL (NU7-3; the branch shipped
          # in v1.3.3 without ever executing here).
          go test -tags mssql ./pkg/app -run '^TestSQLMatrix_AutoMigrate_Exploratory$' -v
          go test -tags mssql ./internal/cli -run '^TestSQLMatrix_ExploratoryCriticalCommands$|^TestSQLMatrix_ExploratoryAdminUserCommands$' -v

      # The OUTPUT INSERTED branch of CRUD.Create shipped in v1.3.1 without
      # ever executing anywhere — this lane ran no CRUD test and the live
      # matrix profile rejected sqlserver URLs. The moment it first ran, the
      # LIMIT-based list queries turned out to be invalid T-SQL too (NU5-4).
      # This step keeps the whole CRUD surface (create+backfill, list, get,
      # update, soft-delete) executing against a real SQL Server.
      - name: Run model CRUD live matrix (MSSQL)
        env:
          NUCLEUS_SQL_MATRIX_URL: 'sqlserver://sa:StrongPassw0rd!@127.0.0.1:1433/master'
        run: go test -tags mssql ./pkg/model -run '^TestCRUDLive_' -v

  db-matrix-live-oracle:
    name: DB Matrix Live (oracle)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      oracle:
        image: gvenzl/oracle-free:23-slim
        env:
          ORACLE_PASSWORD: "oracle"
        ports:
          - 1521:1521
        options: >-
          --shm-size=1g

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true

      - name: Wait for Oracle port
        run: |
          for i in {1..120}; do
            if (echo > /dev/tcp/127.0.0.1/1521) >/dev/null 2>&1; then
              echo "Oracle port is ready"
              exit 0
            fi
            sleep 5
          done
          echo "Oracle did not become reachable on 1521"
          exit 1

      - name: Run live smoke (Oracle)
        env:
          NUCLEUS_SQL_EXPLORATORY_URL: 'oracle://system:oracle@127.0.0.1:1521/FREEPDB1'
        run: |
          go test -tags oracle ./pkg/db -run '^TestSQLMatrix_ExploratoryLiveConnectAndPing$|^TestSQLMatrix_SchemaDrift_Exploratory$' -v
          # ADR-011 resolved the Oracle identifier-casing bug: the scaffold
          # now emits UNQUOTED identifiers (Oracle folds to UPPERCASE),
          # matching the migrations bootstrap, the CRUD layer, and
          # USER_TAB_COLUMNS introspection — so an AutoMigrate'd table is
          # found by `WHERE TABLE_NAME = UPPER(...)`. The exploratory
          # AutoMigrate lane is re-enabled below.
          go test -tags oracle ./pkg/app -run '^TestSQLMatrix_AutoMigrate_Exploratory$' -v
          go test -tags oracle ./internal/cli -run '^TestSQLMatrix_ExploratoryCriticalCommands$' -v

  showcase-smoke:
    name: Showcase Example Smoke
    runs-on: ubuntu-latest
    # examples/showcase_demo spent eight minor releases pinned to a
    # prehistoric dependency set because CI never built it, let alone ran
    # it (QM7-1). Two teeth, both required:
    #   1. check_example_pins.sh — the example's suite requires must equal
    #      the latest published tag of each sibling repo (live ls-remote;
    #      a sibling release makes this fail here until the example is
    #      re-pinned — that failure is the reminder the example never had).
    #   2. run_showcase_smoke.sh — build standalone (GOWORK=off, module
    #      proxy, SQLite), boot the app, and assert both integration cases
    #      over HTTP: the shop API through the quarkbridge-wrapped client
    #      and Orbit's Data Studio backed by quarkdatasource.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true

      - name: Check example pins are the latest published sibling tags
        run: bash scripts/ci/check_example_pins.sh

      - name: Run showcase_demo smoke (build + boot + both cases)
        run: bash scripts/ci/run_showcase_smoke.sh

  compatibility-harness:
    name: Compatibility Harness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true

      - name: Run fixture compatibility harness
        run: |
          mkdir -p ci-reports
          bash scripts/ci/run_compatibility_harness.sh \
            --output ci-reports/compatibility_harness.md \
            --enforce-threshold

      - name: Upload compatibility harness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compatibility-harness-${{ github.run_id }}
          path: ci-reports/compatibility_harness.md
          if-no-files-found: error

  contract-freeze:
    name: Contract Freeze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true

      - name: Validate stable contract freeze baselines
        run: bash scripts/ci/check_contract_freeze.sh

  website-drift:
    name: Website Docs Drift (advisory)
    runs-on: ubuntu-latest
    # Advisory only — intentionally NOT in ci-required-gate.needs. Runs on
    # every push so removed/renamed public symbols referenced by the public
    # site (dangling `covers:` refs) or reintroduced legacy tokens surface
    # immediately. Faithfulness omissions (new surface, silent site) are not
    # machine-checkable here — those are the website-curator subagent's job.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check website/docs drift vs shipped surface
        run: bash scripts/website/check-coverage.sh --strict

  ci-required-gate:
    name: CI Required Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - test
      - db-matrix-required
      - jobs-redis
      - db-matrix-live-mssql
      - db-matrix-live-oracle
      - showcase-smoke
      - compatibility-harness
      - contract-freeze

    steps:
      - name: Evaluate required CI results
        run: |
          set -euo pipefail
          echo "test result: ${{ needs.test.result }}"
          echo "db-matrix-required result: ${{ needs.db-matrix-required.result }}"
          echo "jobs-redis result: ${{ needs.jobs-redis.result }}"
          echo "db-matrix-live-mssql result: ${{ needs.db-matrix-live-mssql.result }}"
          echo "db-matrix-live-oracle result: ${{ needs.db-matrix-live-oracle.result }}"
          echo "showcase-smoke result: ${{ needs.showcase-smoke.result }}"
          echo "compatibility-harness result: ${{ needs.compatibility-harness.result }}"
          echo "contract-freeze result: ${{ needs.contract-freeze.result }}"

          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Required job 'test' did not succeed"
            exit 1
          fi
          if [ "${{ needs.db-matrix-required.result }}" != "success" ]; then
            echo "Required job 'db-matrix-required' did not succeed"
            exit 1
          fi
          if [ "${{ needs.jobs-redis.result }}" != "success" ]; then
            echo "Required job 'jobs-redis' did not succeed"
            exit 1
          fi
          if [ "${{ needs.db-matrix-live-mssql.result }}" != "success" ]; then
            echo "Required job 'db-matrix-live-mssql' did not succeed"
            exit 1
          fi
          if [ "${{ needs.db-matrix-live-oracle.result }}" != "success" ]; then
            echo "Required job 'db-matrix-live-oracle' did not succeed"
            exit 1
          fi
          if [ "${{ needs.showcase-smoke.result }}" != "success" ]; then
            echo "Required job 'showcase-smoke' did not succeed"
            exit 1
          fi
          if [ "${{ needs.compatibility-harness.result }}" != "success" ]; then
            echo "Required job 'compatibility-harness' did not succeed"
            exit 1
          fi
          if [ "${{ needs.contract-freeze.result }}" != "success" ]; then
            echo "Required job 'contract-freeze' did not succeed"
            exit 1
          fi

          echo "All required CI jobs passed."
