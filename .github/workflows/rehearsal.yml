name: Release Rehearsal

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  rehearsal:
    name: Rehearse RC (No Publish)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Run Rehearsal Script
        run: ./scripts/release/rehearse_rc.sh

      - name: Upload Release Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rehearsal-release-reports
          path: |
            dist/reports/compatibility_report.md
            dist/reports/dependency_impact_report.md
          if-no-files-found: error
