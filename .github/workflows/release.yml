name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    name: Verify Release Candidate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true

      - name: Run Go Tests
        run: go test ./...

      - name: Generate compatibility report
        run: |
          mkdir -p release-reports
          bash scripts/release/generate_compatibility_report.sh \
            --output release-reports/compatibility_report.md \
            --enforce-threshold

      - name: Generate dependency impact report
        run: |
          mkdir -p release-reports
          bash scripts/release/generate_dependency_impact_report.sh \
            --output release-reports/dependency_impact_report.md

      - name: Upload release reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-reports-${{ github.ref_name }}
          path: |
            release-reports/compatibility_report.md
            release-reports/dependency_impact_report.md
          if-no-files-found: error

  publish:
    name: Publish Artifacts
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true

      - name: Check Existing Release
        id: release_check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          STATUS=$(curl -sS -o /tmp/release.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}")
          if [ "$STATUS" = "200" ]; then
            ASSETS=$(jq -r '.assets | length' /tmp/release.json)
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "assets=$ASSETS" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "assets=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish With GoReleaser
        if: steps.release_check.outputs.exists != 'true' || steps.release_check.outputs.assets == '0'
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: v2.14.1
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip Publish (Already Released)
        if: steps.release_check.outputs.exists == 'true' && steps.release_check.outputs.assets != '0'
        run: |
          echo "Release ${GITHUB_REF_NAME} already has published artifacts."
