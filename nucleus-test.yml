# Nucleus - Configuración de prueba
# Single node

# Entorno
env: development
debug: true
log_level: debug

# Servidor
host: 0.0.0.0
port: 8080

# El admin ya no es parte del core: se monta con el módulo orbit
# (github.com/jcsvwinston/orbit) vía la API de extensión.

# Base de datos (SQLite por defecto)
database_default: default
databases:
  default:
    url: sqlite://nucleus.db
    max_open: 25
    max_idle: 5
    max_lifetime: 5m

# Sesiones (in-memory para desarrollo)
session_store: memory
session_cookie_secure: false
session_cookie_samesite: lax
