# oauth2-proxy in fake-OIDC mode for the quickstart. Replace with your
# real provider config (Google, Auth0, Keycloak, Okta, ...) when going
# beyond local development.
#
# This file uses the "static credentials via htpasswd" path that
# oauth2-proxy ships out of the box. Username/password: admin / admin.

provider              = "google"
client_id             = "local-quickstart"
client_secret         = "local-quickstart-secret"
cookie_secret         = "0123456789abcdef0123456789abcdef"

email_domains         = ["*"]

http_address          = "0.0.0.0:4180"
upstreams             = ["http://admin-server:8080"]

# We only need the trusted-proxy header to reach the admin server. The
# admin server's auth middleware reads X-Auth-User / X-Auth-Email; we
# tell oauth2-proxy to set those header names.
set_xauthrequest      = true
set_authorization_header = false
pass_authorization_header = false
pass_user_headers     = true
pass_access_token     = false

# In production a real OIDC IdP replaces the htpasswd block. The file
# format is `username:bcrypt-hashed-password`. The hash below is for
# password "admin" (cost 10).
htpasswd_file         = "/etc/oauth2-proxy.htpasswd"
display_htpasswd_form = true

# Cookie hardening
cookie_secure   = false   # http-only quickstart; flip to true behind TLS
cookie_httponly = true
cookie_samesite = "lax"

# Don't redirect /healthz to login.
skip_auth_routes = "GET=/healthz"
