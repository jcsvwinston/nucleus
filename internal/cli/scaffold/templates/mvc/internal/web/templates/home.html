<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }}</title>
  <style>
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: #132032;
      background: radial-gradient(circle at 12% 18%, #dffaf5 0%, transparent 28%),
        radial-gradient(circle at 86% 84%, #ffe8cf 0%, transparent 32%), #f7f7f2;
    }
    .wrap {
      max-width: 860px;
      margin: 32px auto;
      padding: 0 18px;
    }
    .card {
      background: #fff;
      border: 1px solid #dbe4ec;
      border-radius: 16px;
      box-shadow: 0 14px 42px rgba(20, 35, 53, 0.08);
      padding: 24px;
    }
    h1 {
      margin-top: 0;
      font-size: 28px;
    }
    p {
      color: #4b5d70;
    }
    .links {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }
    a {
      display: inline-block;
      text-decoration: none;
      font-weight: 600;
      color: #0f766e;
      border: 1px solid #cfe7e4;
      border-radius: 10px;
      background: #f3fbfa;
      padding: 10px 12px;
      width: fit-content;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>{{ .Title }}</h1>
      <p>Starter Nucleus generado por CLI.</p>
      <div class="links">
        <a href="/admin">Abrir Admin</a>
        <a href="/api/articles">GET /api/articles</a>
      </div>
    </section>
  </main>
</body>
</html>
